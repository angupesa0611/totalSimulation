  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3100:80"
    depends_on:
      - orchestrator

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./containers/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./containers/cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - client
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  redis-data:
