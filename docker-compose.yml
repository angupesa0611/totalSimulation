services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data/results:/data/results
      - ./shared:/app/shared:ro
    depends_on:
      redis:
        condition: service_healthy

  openmm-worker:
    build:
      context: ./containers/openmm
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./data/results:/data/results
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - molecular

  psi4-worker:
    build:
      context: ./containers/psi4
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./data/results:/data/results
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - electronic

