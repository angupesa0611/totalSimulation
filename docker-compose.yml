services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: totalsimulation
      POSTGRES_USER: totalsim
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-totalsim_dev}
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U totalsim -d totalsimulation"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data/results:/data/results
      - ./shared:/app/shared:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - default
      - personal-net

  openmm-worker:
    build:
      context: ./containers/openmm
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./data/results:/data/results
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - workers
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  psi4-worker:
